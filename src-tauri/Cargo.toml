[package]
name = "codex-app-manager"
# Disambiguate the GUI app from the src/bin/* dev harnesses (e.g.
# win_real_smoke) so `cargo run` and `tauri build` pick the real app, not a
# test binary. Without this, tauri can bundle a harness and the app exits at
# launch.
default-run = "codex-app-manager"
version = "0.1.0"
description = "A cross-platform manager for installing and updating mirrored official Codex desktop app packages."
authors = ["Wangnov"]
edition = "2021"
license = "MIT"
repository = "https://github.com/Wangnov/codex-app-mirror"

[lib]
name = "codex_app_manager_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.6.2", features = [] }

[dependencies]
codex-mac-engine = { path = "../crates/codex-mac-engine" }
codex-win-engine = { path = "../crates/codex-win-engine" }
directories = "6.0.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2.11.2", features = ["tray-icon", "image-png", "macos-private-api"] }
tauri-plugin-autostart = "2"
tauri-plugin-process = "2"
tauri-plugin-updater = "2"
thiserror = "2.0"
