name: CI

# Fast pull-request gate: type-check, unit tests and a cross-platform Rust
# clippy/test pass. The heavy signed/notarized bundle build stays in
# the default-branch release.yml (signalled by v* tags) — this never builds or
# signs the .app.
on:
  pull_request:
  push:
    branches: [main]

# Newer pushes to the same ref supersede in-flight runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run check
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test --if-present
      - name: Build frontend
        run: npm run build

  rust:
    name: Rust
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v6
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: src-tauri -> target
      - run: npm ci
      # tauri-build (frontendDist: ../dist) reads the built frontend at compile
      # time, so produce dist before touching cargo. We deliberately do NOT run
      # `tauri build` here — no bundling, no signing, no notarization.
      - name: Build frontend (for tauri-build)
        run: npm run build
      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --workspace --all-targets -- -D warnings
      - name: Test (src-tauri)
        run: cargo test --manifest-path src-tauri/Cargo.toml --workspace
      # Path deps are not workspace members, so their unit/integration tests are
      # not covered by the step above. Run each engine crate explicitly so
      # mac/win pure-logic regressions fail required CI on every PR.
      - name: Test codex-mac-engine (standalone)
        run: cargo test --manifest-path crates/codex-mac-engine/Cargo.toml --all-targets
      - name: Test codex-win-engine (standalone)
        run: cargo test --manifest-path crates/codex-win-engine/Cargo.toml --all-targets

  audit:
    name: Audit (report)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v6
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - run: npm ci
      - name: npm audit
        continue-on-error: true
        run: npm audit --audit-level=high
      - name: Install cargo audit tools
        continue-on-error: true
        run: cargo install cargo-audit cargo-deny --locked
      - name: cargo audit
        continue-on-error: true
        run: cargo audit --file src-tauri/Cargo.lock
      - name: cargo deny
        continue-on-error: true
        run: cargo deny --manifest-path src-tauri/Cargo.toml check

  worker-test:
    name: Cloudflare worker tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Detect Cloudflare changes
        id: changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$BASE_SHA" ]; then
            git fetch --no-tags --depth=1 origin "$BASE_SHA"
            git diff --name-only "$BASE_SHA" HEAD > changed-files.txt
          elif [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            git fetch --no-tags --depth=1 origin "$BEFORE_SHA" || true
            git diff --name-only "$BEFORE_SHA" HEAD > changed-files.txt || git show --name-only --format= HEAD > changed-files.txt
          else
            git show --name-only --format= HEAD > changed-files.txt
          fi

          if grep -q '^cloudflare/' changed-files.txt; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No cloudflare/** changes; skipping worker tests."
          fi

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v6
        if: steps.changes.outputs.run == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloudflare/manager-download-router/package-lock.json

      - name: Install worker dependencies
        if: steps.changes.outputs.run == 'true'
        working-directory: cloudflare/manager-download-router
        run: npm ci

      - name: Run worker tests
        if: steps.changes.outputs.run == 'true'
        working-directory: cloudflare/manager-download-router
        run: npm test
