name: Release

# Tag-driven cross-platform release:
#   build (unsigned) → macOS finalize (adaptive icon + inside-out Developer ID
#   sign + notarize + staple + repackage updater/dmg) → collect → publish a
#   GitHub Release with the Tauri updater manifest (latest.json).
#
# Required repo secrets (Settings ▸ Secrets and variables ▸ Actions):
#   APPLE_CERTIFICATE            base64 of your "Developer ID Application" .p12
#   APPLE_CERTIFICATE_PASSWORD   password for that .p12
#   APPLE_SIGNING_IDENTITY       "Developer ID Application: NAME (TEAMID)"
#   KEYCHAIN_PASSWORD            any throwaway password for the temp keychain
#   AC_API_KEY_ID                App Store Connect API key id
#   AC_API_ISSUER_ID             App Store Connect issuer id
#   AC_API_KEY_BASE64            base64 of the AuthKey_XXXX.p8
#   TAURI_SIGNING_PRIVATE_KEY            updater private key (string)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   its password (empty if none)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    if: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}
    # Repo admins should configure the release environment and copy signing
    # secrets there before moving them off repo-level Actions secrets.
    environment: release
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: macos-latest, target: aarch64-apple-darwin, os: macos }
          # Intel build on GitHub's current x86_64 image — macos-13 retired
          # 2025-12; macos-15-intel is the last Intel image (until ~2027-08).
          - { platform: macos-15-intel, target: x86_64-apple-darwin, os: macos }
          - { platform: windows-latest, target: x86_64-pc-windows-msvc, os: windows }
          - { platform: windows-latest, target: aarch64-pc-windows-msvc, os: windows }
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: src-tauri -> target

      - run: npm ci

      # ── macOS: vendor the Sparkle BinaryDelta helper BEFORE the build so it
      #    ships in Resources/. Without it the manager can't apply deltas and
      #    every macOS update silently falls back to the full-package download
      #    (the 0.1.x releases up to 0.1.12 shipped without it). The script
      #    pins Sparkle 2.9.1 by SHA-256; see scripts/vendor-binary-delta.sh.
      - name: Vendor Sparkle BinaryDelta (macOS delta updates)
        if: matrix.os == 'macos'
        run: bash scripts/vendor-binary-delta.sh

      # ── macOS: import the Developer ID cert into a throwaway keychain ──────
      - name: Import Apple Developer ID certificate
        if: matrix.os == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KC="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KC" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KC"
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed s/\"//g)

      # ── Build WITHOUT a tauri signingIdentity; we sign inside-out after ────
      - name: Build (Tauri, unsigned)
        shell: bash
        # Bundling downloads toolchains on the fly (e.g. the NSIS archive from
        # GitHub) which occasionally 504s and fails the whole release. Retry a
        # few times so a transient download hiccup doesn't sink the run — cargo
        # output is cached, so a retry mostly just re-runs the bundling step.
        run: |
          for attempt in 1 2 3; do
            npm run tauri build -- --target ${{ matrix.target }} && exit 0
            echo "::warning::tauri build attempt ${attempt} failed (often a transient NSIS/toolchain download, e.g. HTTP 504) — retrying in 20s"
            sleep 20
          done
          echo "::error::tauri build failed after 3 attempts"
          exit 1

      # Regression gate: losing the helper is otherwise SILENT — updates still
      # succeed, they just always download the full ~400MB package instead of
      # the ~40MB delta. Fail the release loudly instead.
      - name: Assert BinaryDelta inside the bundle
        if: matrix.os == 'macos'
        run: |
          APP="$(find "src-tauri/target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -name '*.app' | head -1)"
          BD="$APP/Contents/Resources/resources/BinaryDelta"
          [ -x "$BD" ] || { echo "::error::BinaryDelta missing or not executable at $BD — macOS delta updates would silently fall back to full downloads"; exit 1; }
          arches="$(lipo -archs "$BD")"
          case "$arches" in
            *x86_64*arm64*|*arm64*x86_64*) echo "BinaryDelta OK ($arches): $BD" ;;
            *) echo "::error::BinaryDelta is not universal (arches: $arches)"; exit 1 ;;
          esac

      # ── macOS: adaptive icon → sign → notarize → staple → repackage ───────
      - name: Finalize macOS bundle
        if: matrix.os == 'macos'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_BASE64: ${{ secrets.AC_API_KEY_BASE64 }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          echo "$AC_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          export AC_API_KEY="$RUNNER_TEMP/AuthKey.p8"
          bash scripts/finalize-macos.sh "${{ matrix.target }}"

      # ── Windows: sign the NSIS installer for the updater ──────────────────
      #    The build is intentionally unsigned (mirroring macOS), so Tauri emits
      #    no `.sig`. In Tauri 2 the Windows updater ships the `-setup.exe`
      #    itself, so signing it here with the updater key — exactly what
      #    finalize-macos.sh does for the .app.tar.gz — is equivalent to
      #    `createUpdaterArtifacts` and is what gets windows-x86_64 and
      #    windows-aarch64 into latest.json. Without it the manifest has macOS
      #    platforms only and Windows in-app self-update never sees new versions.
      - name: Sign Windows updater artifact
        if: matrix.os == 'windows'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          B="src-tauri/target/${{ matrix.target }}/release/bundle"
          shopt -s nullglob
          signed=0
          for exe in "$B"/nsis/*-setup.exe; do
            npx tauri signer sign "$exe"
            signed=$((signed + 1))
          done
          if [ "$signed" -eq 0 ]; then
            echo "::error::no NSIS -setup.exe found to sign under $B/nsis" >&2
            exit 1
          fi

      # ── Collect artifacts (rename macOS updater tarball with its arch so the
      #    two macOS jobs don't collide when merged) ──────────────────────────
      - name: Collect artifacts
        shell: bash
        run: |
          DST="$GITHUB_WORKSPACE/dist-artifacts"; mkdir -p "$DST"
          B="src-tauri/target/${{ matrix.target }}/release/bundle"
          ARCH="${{ matrix.target }}"; ARCH="${ARCH%%-*}"
          shopt -s nullglob
          if [ "${{ matrix.os }}" = "macos" ]; then
            for f in "$B"/macos/*.app.tar.gz;      do cp "$f" "$DST/CodexAppManager_${ARCH}.app.tar.gz"; done
            for f in "$B"/macos/*.app.tar.gz.sig;  do cp "$f" "$DST/CodexAppManager_${ARCH}.app.tar.gz.sig"; done
            for f in "$B"/dmg/*.dmg;               do cp "$f" "$DST/CodexAppManager_${ARCH}.dmg"; done
          else
            # Strip spaces from the NSIS filenames (productName is "Codex App
            # Manager"). GitHub rewrites spaces to dots in uploaded asset names,
            # but gen-updater-manifest.mjs builds the URL from the pre-upload
            # filename — so a spaced name yields a %20 URL that 404s against the
            # dotted asset. Renaming space-free here keeps asset name == manifest
            # URL (the macOS branch already renames for the same reason).
            for f in "$B"/nsis/*-setup.exe "$B"/nsis/*-setup.exe.sig \
                     "$B"/nsis/*.nsis.zip "$B"/nsis/*.nsis.zip.sig; do
              n="$(basename "$f")"; cp "$f" "$DST/${n// /}"
            done
          fi
          ls -la "$DST"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: bundle-${{ matrix.target }}
          path: dist-artifacts/*
          if-no-files-found: error

  release:
    if: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}
    needs: build
    # Repo admins should configure the release environment and copy mirror
    # secrets there before moving them off repo-level Actions secrets.
    environment: release
    permissions:
      contents: write
      actions: write # dispatch winget.yml after publishing (release events from GITHUB_TOKEN don't cascade)
      id-token: write # provenance attestations
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 20

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate updater manifest (latest.json)
        env:
          ALLOW_PARTIAL_RELEASE: ${{ vars.ALLOW_PARTIAL_RELEASE }}
        run: node scripts/gen-updater-manifest.mjs "${{ github.ref_name }}" dist

      # Stable releases mirror in two phases: stage immutable versioned assets
      # before GitHub Release publication, then promote latest.json only after
      # the GitHub Release succeeds. Pre-releases still skip the mirror entirely.
      - name: Stage CDN mirror candidate (R2 + IHEP S3)
        id: mirror_stage
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          MIRROR_PHASE: stage
          MANAGER_R2_S3_ENDPOINT: ${{ secrets.MANAGER_R2_S3_ENDPOINT }}
          MANAGER_R2_ACCESS_KEY_ID: ${{ secrets.MANAGER_R2_ACCESS_KEY_ID }}
          MANAGER_R2_SECRET_ACCESS_KEY: ${{ secrets.MANAGER_R2_SECRET_ACCESS_KEY }}
          MANAGER_IHEP_S3_ENDPOINT: ${{ secrets.MANAGER_IHEP_S3_ENDPOINT }}
          MANAGER_IHEP_S3_BUCKET: ${{ secrets.MANAGER_IHEP_S3_BUCKET }}
          MANAGER_IHEP_S3_REGION: ${{ secrets.MANAGER_IHEP_S3_REGION }}
          MANAGER_IHEP_S3_PREFIX: ${{ secrets.MANAGER_IHEP_S3_PREFIX }}
          MANAGER_IHEP_S3_ACCESS_KEY_ID: ${{ secrets.MANAGER_IHEP_S3_ACCESS_KEY_ID }}
          MANAGER_IHEP_S3_SECRET_ACCESS_KEY: ${{ secrets.MANAGER_IHEP_S3_SECRET_ACCESS_KEY }}
        run: |
          [ -f dist/latest.json ] || cp latest.json dist/latest.json
          bash scripts/sync-mirror.sh dist
          rm -f dist/latest.mirror.json

      # ── release notes: the hand-written file from the version-bump PR
      #    (docs/releases/<tag>.md, see docs/releases/TEMPLATE.md) wins;
      #    otherwise the minimal install table keeps the body from ever being
      #    empty. GitHub's auto "What's Changed" section is appended either way.
      - name: Prepare release notes
        run: |
          NOTES="docs/releases/${{ github.ref_name }}.md"
          if [ -f "$NOTES" ]; then
            cp "$NOTES" "$RUNNER_TEMP/release-notes.md"
          else
            echo "::warning::$NOTES not found — publishing with fallback notes"
            cp docs/releases/FALLBACK.md "$RUNNER_TEMP/release-notes.md"
          fi

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          (
            cd dist
            sha256sum * | sort -k2
          ) > SHA256SUMS
          if [ ! -f dist/latest.json ]; then
            sha256sum latest.json >> SHA256SUMS
          fi
          cat SHA256SUMS

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Generate SBOMs
        id: sbom
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p release-assets
          status=0
          : > release-assets/sbom-status.txt

          if npm sbom --package-lock-only --sbom-format cyclonedx > release-assets/sbom-npm.cdx.json; then
            echo "npm SBOM: generated" >> release-assets/sbom-status.txt
          else
            echo "::warning::npm SBOM generation failed"
            echo "npm SBOM: failed" >> release-assets/sbom-status.txt
            rm -f release-assets/sbom-npm.cdx.json
            status=1
          fi

          if cargo metadata --manifest-path src-tauri/Cargo.toml --format-version=1 > "$RUNNER_TEMP/cargo-metadata.json" \
            && node scripts/cargo-metadata-to-cyclonedx.mjs "$RUNNER_TEMP/cargo-metadata.json" release-assets/sbom-cargo.cdx.json; then
            echo "cargo SBOM: generated" >> release-assets/sbom-status.txt
          else
            echo "::warning::cargo SBOM generation failed"
            echo "cargo SBOM: failed" >> release-assets/sbom-status.txt
            rm -f release-assets/sbom-cargo.cdx.json
            status=1
          fi

          exit "$status"

      - name: Publish GitHub Release
        id: publish_release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          # Tags carrying a pre-release identifier (e.g. v0.1.2-rc1) publish as a
          # prerelease, so GitHub's `releases/latest` — and the updater endpoint
          # pointing at it — keep resolving to the last stable build instead of
          # serving a release-candidate to real users.
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: ${{ runner.temp }}/release-notes.md
          generate_release_notes: true
          files: |
            dist/*
            latest.json
            SHA256SUMS
            release-assets/*

      - name: Promote CDN mirror latest (R2 + IHEP S3)
        id: mirror_promote
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          MIRROR_PHASE: promote
          MANAGER_R2_S3_ENDPOINT: ${{ secrets.MANAGER_R2_S3_ENDPOINT }}
          MANAGER_R2_ACCESS_KEY_ID: ${{ secrets.MANAGER_R2_ACCESS_KEY_ID }}
          MANAGER_R2_SECRET_ACCESS_KEY: ${{ secrets.MANAGER_R2_SECRET_ACCESS_KEY }}
          MANAGER_IHEP_S3_ENDPOINT: ${{ secrets.MANAGER_IHEP_S3_ENDPOINT }}
          MANAGER_IHEP_S3_BUCKET: ${{ secrets.MANAGER_IHEP_S3_BUCKET }}
          MANAGER_IHEP_S3_REGION: ${{ secrets.MANAGER_IHEP_S3_REGION }}
          MANAGER_IHEP_S3_PREFIX: ${{ secrets.MANAGER_IHEP_S3_PREFIX }}
          MANAGER_IHEP_S3_ACCESS_KEY_ID: ${{ secrets.MANAGER_IHEP_S3_ACCESS_KEY_ID }}
          MANAGER_IHEP_S3_SECRET_ACCESS_KEY: ${{ secrets.MANAGER_IHEP_S3_SECRET_ACCESS_KEY }}
        run: |
          [ -f dist/latest.json ] || cp latest.json dist/latest.json
          bash scripts/sync-mirror.sh dist

      - name: Attest build provenance
        id: attest
        if: ${{ steps.publish_release.outcome == 'success' }}
        continue-on-error: true
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: |
            dist/*
            latest.json
            SHA256SUMS
            release-assets/*

      # The release above is created with GITHUB_TOKEN, which by design does not
      # trigger other workflows — so winget.yml's `on: release` never fires.
      # Dispatch it explicitly (stable releases only). winget.yml no-ops cleanly
      # without WINGET_TOKEN, and winget-releaser skips versions already present,
      # so a re-run is harmless.
      - name: Trigger winget submission
        id: winget
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh workflow run winget.yml -f release-tag="${{ github.ref_name }}" --repo "${{ github.repository }}"; then
            echo "status=dispatched" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::winget dispatch failed"
            echo "status=dispatch_failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Write release summary
        if: always()
        env:
          PUBLISH_OUTCOME: ${{ steps.publish_release.outcome }}
          MIRROR_STAGE_OUTCOME: ${{ steps.mirror_stage.outcome }}
          MIRROR_PROMOTE_OUTCOME: ${{ steps.mirror_promote.outcome }}
          WINGET_OUTCOME: ${{ steps.winget.outputs.status || steps.winget.outcome }}
          SBOM_OUTCOME: ${{ steps.sbom.outcome }}
          ATTESTATION_OUTCOME: ${{ steps.attest.outcome }}
        run: node scripts/write-release-summary.mjs
