name: Release

# Tag-driven cross-platform release:
#   build (unsigned) → macOS finalize (adaptive icon + inside-out Developer ID
#   sign + notarize + staple + repackage updater/dmg) → collect → publish a
#   GitHub Release with the Tauri updater manifest (latest.json).
#
# Required repo secrets (Settings ▸ Secrets and variables ▸ Actions):
#   APPLE_CERTIFICATE            base64 of your "Developer ID Application" .p12
#   APPLE_CERTIFICATE_PASSWORD   password for that .p12
#   APPLE_SIGNING_IDENTITY       "Developer ID Application: NAME (TEAMID)"
#   KEYCHAIN_PASSWORD            any throwaway password for the temp keychain
#   AC_API_KEY_ID                App Store Connect API key id
#   AC_API_ISSUER_ID             App Store Connect issuer id
#   AC_API_KEY_BASE64            base64 of the AuthKey_XXXX.p8
#   TAURI_SIGNING_PRIVATE_KEY            updater private key (string)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   its password (empty if none)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: macos-latest, target: aarch64-apple-darwin, os: macos }
          # Intel build on GitHub's current x86_64 image — macos-13 retired
          # 2025-12; macos-15-intel is the last Intel image (until ~2027-08).
          - { platform: macos-15-intel, target: x86_64-apple-darwin, os: macos }
          - { platform: windows-latest, target: x86_64-pc-windows-msvc, os: windows }
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm ci

      # ── macOS: import the Developer ID cert into a throwaway keychain ──────
      - name: Import Apple Developer ID certificate
        if: matrix.os == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KC="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KC" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KC"
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed s/\"//g)

      # ── Build WITHOUT a tauri signingIdentity; we sign inside-out after ────
      - name: Build (Tauri, unsigned)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target ${{ matrix.target }}

      # ── macOS: adaptive icon → sign → notarize → staple → repackage ───────
      - name: Finalize macOS bundle
        if: matrix.os == 'macos'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_BASE64: ${{ secrets.AC_API_KEY_BASE64 }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          echo "$AC_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          export AC_API_KEY="$RUNNER_TEMP/AuthKey.p8"
          bash scripts/finalize-macos.sh "${{ matrix.target }}"

      # ── Windows: sign the NSIS installer for the updater ──────────────────
      #    The build is intentionally unsigned (mirroring macOS), so Tauri emits
      #    no `.sig`. In Tauri 2 the Windows updater ships the `-setup.exe`
      #    itself, so signing it here with the updater key — exactly what
      #    finalize-macos.sh does for the .app.tar.gz — is equivalent to
      #    `createUpdaterArtifacts` and is what gets windows-x86_64 into
      #    latest.json. Without it the manifest has macOS platforms only and
      #    Windows in-app self-update never sees new versions.
      - name: Sign Windows updater artifact
        if: matrix.os == 'windows'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          B="src-tauri/target/${{ matrix.target }}/release/bundle"
          shopt -s nullglob
          signed=0
          for exe in "$B"/nsis/*-setup.exe; do
            npx tauri signer sign "$exe"
            signed=$((signed + 1))
          done
          if [ "$signed" -eq 0 ]; then
            echo "::error::no NSIS -setup.exe found to sign under $B/nsis" >&2
            exit 1
          fi

      # ── Collect artifacts (rename macOS updater tarball with its arch so the
      #    two macOS jobs don't collide when merged) ──────────────────────────
      - name: Collect artifacts
        shell: bash
        run: |
          DST="$GITHUB_WORKSPACE/dist-artifacts"; mkdir -p "$DST"
          B="src-tauri/target/${{ matrix.target }}/release/bundle"
          ARCH="${{ matrix.target }}"; ARCH="${ARCH%%-*}"
          shopt -s nullglob
          if [ "${{ matrix.os }}" = "macos" ]; then
            for f in "$B"/macos/*.app.tar.gz;      do cp "$f" "$DST/CodexAppManager_${ARCH}.app.tar.gz"; done
            for f in "$B"/macos/*.app.tar.gz.sig;  do cp "$f" "$DST/CodexAppManager_${ARCH}.app.tar.gz.sig"; done
            for f in "$B"/dmg/*.dmg;               do cp "$f" "$DST/CodexAppManager_${ARCH}.dmg"; done
          else
            # Strip spaces from the NSIS filenames (productName is "Codex App
            # Manager"). GitHub rewrites spaces to dots in uploaded asset names,
            # but gen-updater-manifest.mjs builds the URL from the pre-upload
            # filename — so a spaced name yields a %20 URL that 404s against the
            # dotted asset. Renaming space-free here keeps asset name == manifest
            # URL (the macOS branch already renames for the same reason).
            for f in "$B"/nsis/*-setup.exe "$B"/nsis/*-setup.exe.sig \
                     "$B"/nsis/*.nsis.zip "$B"/nsis/*.nsis.zip.sig; do
              n="$(basename "$f")"; cp "$f" "$DST/${n// /}"
            done
          fi
          ls -la "$DST"

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: dist-artifacts/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate updater manifest (latest.json)
        run: node scripts/gen-updater-manifest.mjs "${{ github.ref_name }}" dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          # Tags carrying a pre-release identifier (e.g. v0.1.2-rc1) publish as a
          # prerelease, so GitHub's `releases/latest` — and the updater endpoint
          # pointing at it — keep resolving to the last stable build instead of
          # serving a release-candidate to real users.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*
            latest.json
